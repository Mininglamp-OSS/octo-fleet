# octo-fleet config — minimal subset of octo-server's tsdd.yaml.
# Only runtime/bot orchestration needs apply.

mode: "debug"
addr: ":8092"
appName: "octo-fleet"
rootDir: "fleetdata"

db:
  # fleet uses its own database schema (octo_fleet) on the shared MySQL.
  # This isolates fleet schema migrations from server's, since both moduls
  # currently embed their own *.sql files.
  mysqlAddr: "root:demo@tcp(127.0.0.1:3306)/octo_fleet?charset=utf8mb4&parseTime=true"
  redisAddr: "127.0.0.1:6379"
  redisPass: ""

external:
  ip: "localhost"
  baseURL: "http://localhost:8092"

# server's base URL — fleet calls /v1/auth/verify-* to authenticate
# user / bot / api_key callers (合并 plan 决策一+二 Phase 4).
# Note: the historical `auth.serverJwksURL` fallback was removed in
# PR-C2 of the octo-auth integration epic (#48). Deployments must set
# `auth.octoServerURL` directly; if omitted, fleet falls back to the
# localhost default below and any real-server traffic fails loudly.
auth:
  octoServerURL: "http://localhost:8090"

logger:
  level: 1
  dir: "./logs"
  lineNum: false
